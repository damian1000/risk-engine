name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write # required for tokenless Codecov uploads (OIDC)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Node # Prettier (config/docs formatting) runs under Spotless
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Read Playwright version # keys the browser cache, so a dep bump refreshes it
        id: playwright
        run: echo "version=$(grep -oP "com.microsoft.playwright:playwright:\K[0-9.]+" app/build.gradle)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}

      - name: Install Playwright Chromium # RiskViewBrowserTest drives it during check
        run: ./gradlew --no-daemon :app:installPlaywrightChromium

      - name: Spotless check
        run: ./gradlew --no-daemon spotlessCheck

      - name: Build, test, and enforce coverage
        run: ./gradlew --no-daemon clean check

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: core/build/reports/jacoco/test/jacocoTestReport.xml,app/build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: false

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            core/build/reports/tests/test
            app/build/reports/tests/test
          if-no-files-found: ignore
