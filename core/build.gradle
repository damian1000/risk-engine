// The pure risk library: model, pricing, risk, report. No web, no entry point - this is the
// module published for consumers (JitPack builds it from a tag).
plugins {
    id 'io.github.damian1000.kotlin-conventions'
    id 'java-library'
    id 'maven-publish'
}

group = 'io.github.damian1000'
version = '1.0.0'

java {
    withSourcesJar() // so a consumer's IDE can navigate the source
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8"

    testImplementation deps.hamcrest
    // Property-based testing: a JUnit 5 platform engine, runs alongside ordinary Jupiter tests
    // in the same source set via the existing useJUnitPlatform() -- no separate config needed.
    testImplementation 'net.jqwik:jqwik:1.10.1'
    // Independent implementation the cross-validation tests price against. Test scope only:
    // the pricing in main stays hand-written, Strata never leaks into the library's API.
    testImplementation 'com.opengamma.strata:strata-pricer:2.12.73'
}

// No remote repository: JitPack builds from the git tag, so publishing exists only for
// publishToMavenLocal (local verification and a consumer dry run).
publishing {
    publications {
        maven(MavenPublication) {
            from components.java
            // Not the bare project name 'core': both this repo and orderbook publish a :core,
            // and the artifactId is what keeps them distinct in a local repository.
            artifactId = 'risk-engine-core'
        }
    }
}
