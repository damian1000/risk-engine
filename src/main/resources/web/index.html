<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Risk Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="mark" aria-hidden="true">&#9670;</span> RISK ENGINE
        <span class="eyebrow">option pricing &amp; risk framework</span>
      </div>
    </header>

    <main class="grid">
      <section class="panel report" aria-labelledby="report-heading">
        <h2 class="phead" id="report-heading">Risk Report</h2>
        <div id="report" aria-live="polite"></div>
        <p id="error" class="error" role="alert" hidden></p>
      </section>

      <aside class="side">
        <section class="panel ticket" aria-labelledby="book-heading">
          <h2 class="phead" id="book-heading">Portfolio &amp; Market</h2>
          <form id="book" aria-label="Portfolio and market inputs">
            <div class="ticket-section">Positions</div>
            <label
              >Equity shares
              <input name="equityQty" type="number" step="1" value="100"
            /></label>
            <label
              >Option contracts
              <input name="optionQty" type="number" step="1" value="-100"
            /></label>
            <label
              >Strike <input name="strike" type="number" step="0.01" value="40"
            /></label>
            <label
              >Type
              <select name="optionType">
                <option value="CALL">Call</option>
                <option value="PUT">Put</option>
              </select>
            </label>

            <div class="ticket-section">Market</div>
            <label
              >Spot <input name="spot" type="number" step="0.01" value="42"
            /></label>
            <label
              >Volatility
              <input name="volatility" type="number" step="0.01" value="0.20"
            /></label>
            <label
              >Risk-free rate %
              <input name="riskFreeRate" type="number" step="0.01" value="10"
            /></label>
            <label
              >Dividend yield %
              <input name="dividendYield" type="number" step="0.01" value="0"
            /></label>
            <label
              >Years to expiry
              <input name="timeToExpiry" type="number" step="0.01" value="0.50"
            /></label>
            <label
              >Prior spot
              <input name="priorSpot" type="number" step="0.01" value="42.60"
            /></label>
            <label
              >Confidence
              <input name="confidence" type="number" step="0.01" value="0.99"
            /></label>

            <button type="submit" class="submit recompute">Recompute</button>
          </form>
        </section>
      </aside>
    </main>

    <footer class="statusbar">
      <span class="sb-item">recomputed <span id="age">&mdash;</span></span>
      <span class="sb-item">requests <span id="reqs">0</span></span>
      <span class="grow"></span>
      <span class="sb-item"
        >closed-form Black-Scholes &middot; bump-and-reprice Greeks</span
      >
      <span class="sb-item">
        <a
          href="https://github.com/damian1000/risk-engine"
          target="_blank"
          rel="noopener"
        >
          github.com/damian1000/risk-engine
        </a>
      </span>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
